server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve app at root (direct port access: redirect so base-href path is used)
    location = / {
        return 302 /release-notes-editor/;
    }

    # Serve app under subpath (path-based URL e.g. reverse proxy: http://host/release-notes-editor/)
    location /release-notes-editor/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /release-notes-editor/index.html;
    }

    # SPA fallback for root (in case someone opens a deep link on port)
    location / {
        try_files $uri $uri/ /release-notes-editor/index.html;
    }
}
